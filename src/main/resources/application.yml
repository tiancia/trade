spring:
  application:
    name: trade
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/ai_trade?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:Aa259189.}
  sql:
    init:
      mode: always
      schema-locations: classpath:db/ai_trade_mysql_schema.sql

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

# 项目自定义配置
trade:
  # OKX 交易所客户端配置，用于 REST 和 WebSocket 请求。
  okx:
    # OKX REST API 基础地址。
    base-url: "https://www.okx.com"
    # OKX 公共 WebSocket 地址，用于行情等公开频道。
    ws-public-url: "wss://ws.okx.com:8443/ws/v5/public"
    # OKX 私有 WebSocket 地址，用于账户、订单等需要登录的频道。
    ws-private-url: "wss://ws.okx.com:8443/ws/v5/private"
    # OKX Access Key；不建议写入配置文件，默认也会从 OKX_ACCESS_KEY 等环境变量读取。
    # access-key:
    # OKX Secret Key；不建议写入配置文件，默认也会从 OKX_SECRET_KEY 等环境变量读取。
    # secret-key:
    # OKX API Passphrase；不建议写入配置文件，默认也会从 OKX_ACCESS_PASSPHRASE 等环境变量读取。
    # passphrase:
    proxy:
      # 是否给 OKX HTTP/WebSocket 请求启用代理。
      enabled: true
      # OKX 代理主机地址。
      host: "127.0.0.1"
      # OKX 代理端口。
      port: 7890

  # Polymarket 独立 AI 决策模块；默认关闭，避免启动后直接读取市场并下注。
  polymarket:
    # 是否启用 Polymarket AI 决策调度。
    enabled: false
    # 单次 AI 决策最多分析多少个市场。
    market-limit: 5
    # 指定 Gamma market slug；留空时按 24h 成交量拉取开放市场。
    market-slugs: []
    # 指定 Gamma market id；可与 market-slugs 搭配使用。
    market-ids: []
    # 指定 CLOB token id；配置后只分析这些 outcome token。
    clob-token-ids: []
    # 是否要求市场处于接受订单状态。
    require-accepting-orders: true
    # 传给 AI 的每边盘口档位数。
    order-book-depth: 5
    # 单笔最多下注 USDC。
    max-order-usdc: 5
    # AI 做 BUY 决策需要达到的最低置信度，0.65 表示 65%。
    min-confidence: "0.65"
    # AI 估计概率减去限价后的最低边际，0.03 表示 3 个百分点。
    min-expected-edge: "0.03"
    # 限价下限/上限，单位为每股 outcome 的 USDC。
    min-limit-price: "0.01"
    max-limit-price: "0.95"
    # 默认最小 shares 数；市场返回 min_order_size 时优先使用市场值。
    min-order-size: 5
    # Polymarket 常规定时 AI 决策的执行间隔，单位毫秒。
    decision-fixed-delay-ms: 1800000
    # 应用启动后首次执行 Polymarket AI 决策前的延迟，单位毫秒。
    initial-delay-ms: 60000
    client:
      # Gamma API 基础地址，用于市场发现。
      gamma-base-url: "https://gamma-api.polymarket.com"
      # CLOB API 基础地址，用于订单簿和交易。
      clob-base-url: "https://clob.polymarket.com"
      proxy:
        # 是否给 Polymarket HTTP 请求启用代理。
        enabled: true
        host: "127.0.0.1"
        port: 7890
    execution:
      # 是否启用真实下单；false 时只记录 dry-run。
      enabled: false
      # Python SDK 下单桥接脚本。
      python-command: "python"
      script-path: "scripts/polymarket_place_order.py"
      timeout-ms: 60000
      chain-id: 137
      # EOA 通常为 0；使用 Polymarket proxy/funder 钱包时按官方 SDK 要求调整。
      signature-type: 0
      # 默认使用 fill-and-kill 限价单，避免长期挂单。
      order-type: FAK
      # 密钥
      private-key-env-name: POLYMARKET_PRIVATE_KEY
      api-key-env-name: POLYMARKET_API_KEY
      api-secret-env-name: POLYMARKET_API_SECRET
      api-passphrase-env-name: POLYMARKET_API_PASSPHRASE
      funder-address-env-name: POLYMARKET_FUNDER_ADDRESS
      # 真实下单前调用 Polymarket geoblock API；失败或受限时拒绝下单。
      geoblock-check-enabled: true
      geoblock-url: "https://polymarket.com/api/geoblock"

  # 通用 AI 客户端配置，供 OKX 交易和 Polymarket 决策复用。
  ai:
    client:
      # AI 服务提供商；可选值：gemini、openai-compatible、deepseek、kimi。。。
      provider: deepseek
      # 使用的 AI 模型名称；未配置时会使用 provider 对应的默认模型。
      model: deepseek-v4-pro
      # 保存 AI API Key 的环境变量名；实际密钥建议放在环境变量里。
      api-key-env-name: DEEPSEEK_API_KEY
      # base-url:
      # OpenAI 兼容接口的 chat completions 路径；未配置时会使用 provider 对应的默认路径。
      # chat-completions-path:
      # 是否要求 OpenAI 兼容接口返回 JSON object 格式。
      # json-response-format-enabled: true
      # AI 采样温度；值越低越稳定，未配置时由服务端默认值决定。
      # temperature:
      # 单次 AI 输出的最大 token 数；未配置时由服务端默认值决定。
      # max-output-tokens:
      proxy:
        # 是否给 AI 请求启用代理。
        enabled: true
        # AI 请求代理主机地址。
        host: "127.0.0.1"
        # AI 请求代理端口。
        port: 7890

  # OKX 自动交易模块配置。
  trading:
    # 是否启用 OKX AI 自动交易；false 时调度任务会跳过实际决策和下单。
    enabled: true
    # 交易标的 ID，例如 BTC-USDT。
    inst-id: BTC-USDT
    # OKX 产品类型，例如 SPOT 表示现货。
    inst-type: SPOT
    # 基础币种，用于读取余额和计算卖出数量。
    base-ccy: BTC
    # 计价币种，用于读取余额和限制买入金额。
    quote-ccy: USDT
    # OKX 交易模式；现货通常使用 cash。
    td-mode: cash
    # 单次买入最多使用多少计价币种金额。
    max-buy-quote-amount: 10
    # 单次卖出最多占可用基础币种持仓的比例，1 表示最多全部卖出。
    max-sell-position-ratio: 1
    # 常规定时 AI 决策的执行间隔，单位毫秒。
    decision-fixed-delay-ms: 1800000
    # 市场事件扫描的执行间隔，单位毫秒。
    event-scan-fixed-delay-ms: 60000
    # 应用启动后首次执行常规 AI 决策前的延迟，单位毫秒。
    initial-delay-ms: 30000
    # 应用启动后首次执行市场事件扫描前的延迟，单位毫秒。
    event-initial-delay-ms: 30000
    # 市场事件触发 AI 决策后的冷却时间，单位毫秒。
    event-cooldown-ms: 600000
    websocket:
      # 是否启用 OKX 行情 WebSocket 订阅；启用后事件扫描优先使用 WebSocket 缓存。
      enabled: true
      # WebSocket 行情缓存超过该时间未更新时视为过期，事件扫描会回退到 REST 查询，单位毫秒。
      stale-timeout-ms: 120000
      # 本地保留的 1 分钟 K 线缓存数量，用于事件检测。
      candle-cache-limit: 100
    # 5 分钟价格变化触发 AI 决策的阈值比例，0.02 表示 2%。
    price-move-trigger-percent: "0.02"
    # 1 分钟成交量相对前 20 分钟均量的放大倍数阈值。
    volume-spike-multiplier: 3
    # 本地追踪持仓浮亏触发 AI 决策的阈值比例，0.10 表示 10%。
    floating-loss-trigger-percent: "0.10"
    # Estimated taker fee rate used in AI trading-cost context. 0.001 means 0.1%.
    taker-fee-rate: "0.001"
    # Required expected net edge after fee and spread. 0.001 means 0.1%.
    min-expected-net-edge-percent: "0.001"
    # 本地交易状态文件路径，用于记录 AI 买入后的持仓成本等信息。
    state-file: "data/trading-state.json"
    # Number of recent AI decisions persisted and sent into each new AI request.
    recent-decision-memory-limit: 20
    # 下单前采集的盘口深度档位数。
    # order-book-depth: 5
    # 下单前采集的 1 分钟 K 线数量。
    # one-minute-candle-limit: 25
    # 下单前采集的 5 分钟 K 线数量。
    # five-minute-candle-limit: 24
    # 下单前采集的近期订单数量。
    # recent-order-limit: 10
    # 下单前采集的近期成交数量。
    # recent-fill-limit: 10
    # 下单后查询成交结果的重试次数。
    # order-fill-query-attempts: 5
    # 下单后两次查询成交结果之间的等待时间，单位毫秒。
    # order-fill-query-delay-ms: 1000
    # 买入金额保留的小数位数。
    # quote-amount-scale: 2
